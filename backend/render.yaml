services:
  - type: web
    name: enterprise-rag-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CHROMA_DB_PATH
        value: ./chroma_db
      - key: MAX_CHUNKS
        value: 5
      - key: CHUNK_SIZE
        value: 500
      - key: CHUNK_OVERLAP
        value: 50